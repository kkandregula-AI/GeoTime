<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GeoTime — Earth Change Visualizer</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#07090d; --panel:#0d1520; --border:#1a2d45;
  --amber:#f0a500; --cyan:#00c8d4; --text:#b8cfe0;
  --dim:#3d5570; --green:#3ddc84; --red:#ff4d6a;
  --mono:'Share Tech Mono',monospace; --sans:'Barlow Condensed',sans-serif;
}
html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:var(--sans); }
#app { display:flex; flex-direction:column; height:100vh; }

/* HEADER */
#hdr { background:var(--panel); border-bottom:2px solid var(--border); flex-shrink:0; z-index:1000; position:relative; }
.hr1 { display:flex; align-items:center; gap:8px; padding:7px 10px; }
.logo-o { width:26px;height:26px;flex-shrink:0;border:2px solid var(--amber);border-radius:50%;
  display:flex;align-items:center;justify-content:center;animation:pg 3s infinite; }
.logo-o::after { content:'';width:7px;height:7px;background:var(--amber);border-radius:50%; }
@keyframes pg { 0%,100%{box-shadow:0 0 0 0 rgba(240,165,0,.5)}50%{box-shadow:0 0 0 5px rgba(240,165,0,0)} }
.logo-t { font-family:var(--mono);font-size:15px;letter-spacing:3px;color:var(--amber);white-space:nowrap; }
.logo-s { font-family:var(--mono);font-size:8px;color:var(--dim);letter-spacing:2px; }
.modes { display:flex;gap:3px;margin-left:auto;flex-shrink:0; }
.mb { font-family:var(--mono);font-size:10px;letter-spacing:1px;background:transparent;
  border:1px solid var(--border);color:var(--dim);padding:5px 8px;cursor:pointer;
  text-transform:uppercase;transition:all .15s;white-space:nowrap; }
.mb.on { background:rgba(0,200,212,.12);border-color:var(--cyan);color:var(--cyan); }
.mb:active { opacity:.7; }

.hr2 { display:flex;padding:0 10px 7px; }
#si { flex:1;min-width:0;background:var(--bg);border:1px solid var(--border);border-right:none;
  color:var(--text);padding:8px 10px;font-family:var(--mono);font-size:12px;outline:none; }
#si:focus { border-color:var(--cyan); }
#si::placeholder { color:var(--dim); }
#sb { background:var(--amber);color:var(--bg);border:none;padding:8px 14px;
  font-family:var(--sans);font-weight:700;font-size:12px;cursor:pointer;flex-shrink:0; }
#sb:active { opacity:.8; }

#sd { display:none;position:fixed;background:var(--panel);border:1px solid var(--border);
  border-top:none;z-index:5000;max-height:220px;overflow-y:auto;
  box-shadow:0 12px 32px rgba(0,0,0,.8); }
#sd.on { display:block; }
.si { padding:10px 12px;font-family:var(--mono);font-size:11px;border-bottom:1px solid var(--border);
  cursor:pointer;line-height:1.4; }
.si:hover,.si.hi { background:#111e2e;color:var(--cyan); }
.sit { font-size:9px;color:var(--dim);margin-left:6px;text-transform:uppercase; }

/* MAPS */
#maps { flex:1;position:relative;overflow:hidden; }
.mp { position:absolute;inset:0;display:none; }
.mp.on { display:block; }
#pS { display:flex; }
#pS.on { display:flex; }
.mh { flex:1;position:relative;overflow:hidden; }
.ml { position:absolute;top:8px;left:8px;z-index:400;background:rgba(7,9,13,.88);
  border:1px solid var(--border);font-family:var(--mono);font-size:11px;
  padding:3px 8px;pointer-events:none; }
.ml.L { color:var(--cyan);border-color:rgba(0,200,212,.3); }
.ml.R { color:var(--amber);border-color:rgba(240,165,0,.3); }
.mdv { width:3px;background:var(--amber);flex-shrink:0;cursor:col-resize;z-index:500;position:relative; }
.mdv::after { content:'⇔';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:var(--amber);color:var(--bg);width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:12px; }

#pW { position:relative; }
#mSB,#mST { position:absolute;inset:0;width:100%;height:100%; }
#mST { clip-path:inset(0 50% 0 0); }
.swh { position:absolute;top:0;bottom:0;left:50%;width:3px;background:var(--amber);
  z-index:600;cursor:col-resize;transform:translateX(-50%); }
.swb { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:34px;height:34px;background:var(--amber);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--bg);font-size:14px;box-shadow:0 0 12px rgba(240,165,0,.5);
  user-select:none;touch-action:none; }
.swt { position:absolute;top:8px;z-index:500;background:rgba(7,9,13,.9);
  border:1px solid var(--border);font-family:var(--mono);font-size:11px;
  padding:3px 8px;pointer-events:none; }
.swt.B { left:8px;color:var(--cyan); }
.swt.A { right:8px;color:var(--amber); }

.ayr { position:absolute;top:8px;left:10px;z-index:500;pointer-events:none;
  font-family:var(--mono);font-size:52px;color:var(--amber);opacity:.65;
  text-shadow:0 0 20px rgba(240,165,0,.4);line-height:1; }
.adot { position:absolute;top:70px;left:12px;z-index:500;pointer-events:none;
  font-family:var(--mono);font-size:10px;color:var(--dim);
  display:flex;align-items:center;gap:5px; }
.dot { width:7px;height:7px;background:var(--green);border-radius:50%;animation:bl 1.2s infinite; }
@keyframes bl { 0%,100%{opacity:1}50%{opacity:.2} }

/* BOTTOM BAR */
#bar { background:var(--panel);border-top:2px solid var(--border);
  padding:8px 10px 6px;flex-shrink:0;z-index:900; }
.bt { display:flex;align-items:center;justify-content:space-between;
  gap:8px;margin-bottom:6px;flex-wrap:wrap; }
.ybig { font-family:var(--mono);font-size:24px;color:var(--amber);letter-spacing:2px;line-height:1; }
.ylbl { font-size:9px;color:var(--dim);letter-spacing:2px;margin-top:1px; }
.cr { display:none;align-items:center;gap:6px;flex-wrap:wrap; }
.cr.on { display:flex; }
.cl { font-family:var(--mono);font-size:10px;color:var(--dim); }
.ys { background:var(--bg);border:1px solid var(--border);color:var(--cyan);
  font-family:var(--mono);font-size:12px;padding:4px 8px;outline:none;cursor:pointer; }
.sep { color:var(--dim); }
.ctrls { display:flex;gap:5px;align-items:center; }
.cb { width:30px;height:30px;background:transparent;border:1px solid var(--border);
  color:var(--dim);font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s; }
.cb:hover { border-color:var(--amber);color:var(--amber); }
.cb.pl { border-color:var(--green);color:var(--green); }
.spsel { background:var(--bg);border:1px solid var(--border);color:var(--dim);
  font-family:var(--mono);font-size:10px;padding:4px 6px;outline:none;cursor:pointer; }
.tl { position:relative;height:36px; }
.tks { position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;pointer-events:none; }
.tk { display:flex;flex-direction:column;align-items:center;gap:2px;pointer-events:all;cursor:pointer; }
.tkl { width:1px;height:6px;background:var(--border);transition:background .2s; }
.tkn { font-family:var(--mono);font-size:9px;color:var(--dim);transition:color .2s; }
.tk.on .tkl { background:var(--amber); }
.tk.on .tkn { color:var(--amber); }
#sldr { position:absolute;bottom:2px;left:0;right:0;width:100%;
  -webkit-appearance:none;height:3px;
  background:linear-gradient(to right,var(--amber) var(--p,0%),var(--border) var(--p,0%));
  outline:none; }
#sldr::-webkit-slider-thumb { -webkit-appearance:none;width:16px;height:16px;
  border-radius:50%;background:var(--amber);cursor:pointer;
  box-shadow:0 0 6px rgba(240,165,0,.6); }
.leaflet-control-attribution { display:none!important; }
.leaflet-control-zoom { border:1px solid var(--border)!important; }
.leaflet-control-zoom a { background:var(--panel)!important;color:var(--text)!important;
  border-color:var(--border)!important;font-size:16px!important; }
</style>
</head>
<body>
<div id="app">

<div id="hdr">
  <div class="hr1">
    <div class="logo-o"></div>
    <div><div class="logo-t">GEOTIME</div><div class="logo-s">EARTH CHANGE VISUALIZER</div></div>
    <div class="modes">
      <button class="mb on" data-m="split">SPLIT</button>
      <button class="mb" data-m="swipe">SWIPE</button>
      <button class="mb" data-m="anim">ANIM</button>
    </div>
  </div>
  <div class="hr2">
    <input id="si" type="text" placeholder="Search any city, landmark…" autocomplete="off" autocorrect="off" spellcheck="false"/>
    <button id="sb">LOCATE</button>
  </div>
  <div id="sd"></div>
</div>

<div id="maps">
  <div class="mp on" id="pS">
    <div class="mh">
      <div class="ml L" id="lblL">BEFORE · 2013</div>
      <div id="mL" style="width:100%;height:100%"></div>
    </div>
    <div class="mdv"></div>
    <div class="mh">
      <div class="ml R" id="lblR">AFTER · 2024</div>
      <div id="mR" style="width:100%;height:100%"></div>
    </div>
  </div>

  <div class="mp" id="pW">
    <div class="swt B" id="swB">BEFORE · 2013</div>
    <div class="swt A" id="swA">AFTER · 2024</div>
    <div id="mSB"></div>
    <div id="mST"></div>
    <div class="swh" id="swH"><div class="swb">⇔</div></div>
  </div>

  <div class="mp" id="pA">
    <div class="ayr" id="ayr">2013</div>
    <div class="adot"><div class="dot"></div><span>PLAYING</span></div>
    <div id="mA" style="width:100%;height:100%"></div>
  </div>
</div>

<div id="bar">
  <div class="bt">
    <div><div class="ybig" id="yd">2013</div><div class="ylbl">SELECTED YEAR</div></div>
    <div class="cr on" id="crw">
      <span class="cl">COMPARE</span>
      <select class="ys" id="selB"></select>
      <span class="sep">→</span>
      <select class="ys" id="selA"></select>
    </div>
    <div class="ctrls">
      <button class="cb" id="cBk">⏮</button>
      <button class="cb" id="cPl">▶</button>
      <button class="cb" id="cFw">⏭</button>
      <select class="spsel" id="spd">
        <option value="2000">0.5×</option>
        <option value="1200" selected>1×</option>
        <option value="600">2×</option>
        <option value="300">4×</option>
      </select>
    </div>
  </div>
  <div class="tl">
    <div class="tks" id="tks"></div>
    <input type="range" id="sldr" min="0" step="1" value="0"/>
  </div>
</div>
</div>

<script>
// ════════════════════════════════════════════════════════════
//  TILE STRATEGY
//  We use Google satellite tiles — the most reliable, widely
//  tested public tile source used by thousands of open-source
//  mapping projects. Works in all browsers, no key needed.
//  For the "year" feature, we overlay a transparent date label
//  and (in a future version) can swap to Sentinel/GIBS tiles.
// ════════════════════════════════════════════════════════════

const YEARS = [2013,2014,2015,2016,2017,2018,2019,2020,2021,2022,2023,2024];
const NY = YEARS.length;

// Google Maps satellite — works reliably cross-origin
const GSAT = 'https://mt{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}';
// OpenStreetMap — fallback / street view
const OSM  = 'https://tile.openstreetmap.org/{z}/{x}/{y}.png';
// Google hybrid (satellite + labels)
const GHYB = 'https://mt{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}';

const GSUBS = ['0','1','2','3'];

let center = [17.4435, 78.3772];
let zoom   = 13;
let yIdx   = 0;
let cmpB   = 0;
let cmpA   = NY - 1;
let mode   = 'split';
let playing = false;
let ptimer  = null;

// ── Build maps ──────────────────────────────────────────────
const OPTS = { zoomControl:false, attributionControl:false, maxZoom:20, minZoom:2 };

function mkMap(id) {
  const m = L.map(id, OPTS);
  m.setView(center, zoom);
  return m;
}

function addTile(m, url) {
  return L.tileLayer(url, { subdomains: GSUBS, maxZoom:20, tileSize:256 }).addTo(m);
}

const mL  = mkMap('mL');
const mR  = mkMap('mR');
const mSB = mkMap('mSB');
const mST = mkMap('mST');
const mA  = mkMap('mA');

const ALL = [mL, mR, mSB, mST, mA];

// Add Google satellite to all maps
ALL.forEach(m => addTile(m, GSAT));

// Add zoom controls
ALL.forEach(m => L.control.zoom({ position:'bottomright' }).addTo(m));

// ── Sync movement ────────────────────────────────────────────
let _lock = false;
function syncAll(src) {
  src.on('moveend', () => {
    if (_lock) return;
    _lock = true;
    center = [src.getCenter().lat, src.getCenter().lng];
    zoom   = src.getZoom();
    ALL.forEach(m => { if (m !== src) m.setView(center, zoom, { animate:false }); });
    _lock = false;
  });
}
ALL.forEach(syncAll);

// ── Year selects ─────────────────────────────────────────────
const selB = document.getElementById('selB');
const selA = document.getElementById('selA');
YEARS.forEach((y, i) => {
  selB.innerHTML += `<option value="${i}">${y}</option>`;
  selA.innerHTML += `<option value="${i}">${y}</option>`;
});
selB.value = cmpB;
selA.value = cmpA;
selB.onchange = () => { cmpB = +selB.value; updLabels(); };
selA.onchange = () => { cmpA = +selA.value; updLabels(); };

function updLabels() {
  document.getElementById('lblL').textContent = `BEFORE · ${YEARS[cmpB]}`;
  document.getElementById('lblR').textContent = `AFTER · ${YEARS[cmpA]}`;
  document.getElementById('swB').textContent  = `BEFORE · ${YEARS[cmpB]}`;
  document.getElementById('swA').textContent  = `AFTER · ${YEARS[cmpA]}`;
}
updLabels();

// ── Ticks + slider ───────────────────────────────────────────
const tksEl = document.getElementById('tks');
const sldr  = document.getElementById('sldr');
sldr.max = NY - 1;

YEARS.forEach((y, i) => {
  const t = document.createElement('div');
  t.className = 'tk' + (i===0?' on':'');
  t.innerHTML = `<div class="tkl"></div><div class="tkn">${y}</div>`;
  t.onclick = () => { yIdx=i; updYear(); sldr.value=i; updTrack(); };
  tksEl.appendChild(t);
});

sldr.addEventListener('input', () => { yIdx=+sldr.value; updYear(); updTrack(); });

function updYear() {
  const y = YEARS[yIdx];
  document.getElementById('yd').textContent  = y;
  document.getElementById('ayr').textContent = y;
  tksEl.querySelectorAll('.tk').forEach((t,i) => t.classList.toggle('on', i===yIdx));
}

function updTrack() {
  sldr.style.setProperty('--p', (yIdx/(NY-1)*100)+'%');
}
updTrack();

// ── Mode switch ──────────────────────────────────────────────
document.querySelectorAll('.mb').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.mb').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    gotoMode(btn.dataset.m);
  };
});

function gotoMode(m) {
  mode = m;
  ['pS','pW','pA'].forEach(id => document.getElementById(id).classList.remove('on'));
  document.getElementById('crw').classList.remove('on');

  if (m === 'split') {
    document.getElementById('pS').classList.add('on');
    document.getElementById('crw').classList.add('on');
    setTimeout(() => { mL.invalidateSize(); mR.invalidateSize(); }, 80);
  } else if (m === 'swipe') {
    document.getElementById('pW').classList.add('on');
    document.getElementById('crw').classList.add('on');
    setTimeout(() => { mSB.invalidateSize(); mST.invalidateSize(); initSwipe(); }, 80);
  } else {
    document.getElementById('pA').classList.add('on');
    setTimeout(() => { mA.invalidateSize(); mA.setView(center, zoom); }, 80);
  }
}

// ── Swipe ────────────────────────────────────────────────────
function initSwipe() {
  const H = document.getElementById('swH');
  const T = document.getElementById('mST');
  const W = document.getElementById('pW');
  let d = false;

  function mv(x) {
    const r = W.getBoundingClientRect();
    const p = Math.max(5, Math.min(95, (x-r.left)/r.width*100));
    H.style.left = p+'%';
    T.style.clipPath = `inset(0 ${100-p}% 0 0)`;
  }

  H.onmousedown  = e => { d=true; e.preventDefault(); };
  H.ontouchstart = () => d=true;
  document.onmousemove = e => { if(d) mv(e.clientX); };
  document.ontouchmove = e => { if(d) mv(e.touches[0].clientX); };
  document.onmouseup  = () => d=false;
  document.ontouchend = () => d=false;

  const r = W.getBoundingClientRect();
  mv(r.left + r.width/2);
}

// ── Playback ─────────────────────────────────────────────────
document.getElementById('cPl').onclick = togglePlay;
document.getElementById('cBk').onclick = () => { stopPlay(); yIdx=0; updYear(); sldr.value=0; updTrack(); };
document.getElementById('cFw').onclick = () => { stopPlay(); yIdx=NY-1; updYear(); sldr.value=NY-1; updTrack(); };

function togglePlay() { playing ? stopPlay() : startPlay(); }

function startPlay() {
  if (mode !== 'anim') {
    gotoMode('anim');
    document.querySelectorAll('.mb').forEach(b => b.classList.toggle('on', b.dataset.m==='anim'));
  }
  playing = true;
  document.getElementById('cPl').textContent = '⏸';
  document.getElementById('cPl').classList.add('pl');
  if (yIdx >= NY-1) yIdx = 0;
  const ms = +document.getElementById('spd').value;
  ptimer = setInterval(() => {
    yIdx++;
    if (yIdx >= NY) { yIdx=NY-1; stopPlay(); return; }
    updYear(); sldr.value=yIdx; updTrack();
  }, ms);
}

function stopPlay() {
  playing = false; clearInterval(ptimer);
  document.getElementById('cPl').textContent = '▶';
  document.getElementById('cPl').classList.remove('pl');
}

// ── Search (Photon/Komoot — CORS-open, no key) ───────────────
const siEl = document.getElementById('si');
const sbEl = document.getElementById('sb');
const sdEl = document.getElementById('sd');
let sres = [], hiI = -1, sdt = null;

function sdPos() {
  const r  = siEl.getBoundingClientRect();
  const r2 = sbEl.getBoundingClientRect();
  sdEl.style.top   = r.bottom + 'px';
  sdEl.style.left  = r.left   + 'px';
  sdEl.style.width = (r2.right - r.left) + 'px';
}

function bname(p) {
  return [p.name, p.city!==p.name&&p.city, p.state, p.country].filter(Boolean).join(', ');
}

function renderSD(items) {
  sres = items; hiI = -1; sdEl.innerHTML = '';
  if (!items.length) { sdEl.innerHTML='<div class="si" style="color:var(--dim);pointer-events:none">No results</div>'; return; }
  items.forEach((it, i) => {
    const d = document.createElement('div');
    d.className = 'si';
    const nm = bname(it.properties);
    const tp = (it.properties.osm_value||'').replace(/_/g,' ');
    d.innerHTML = `${nm}<span class="sit">${tp}</span>`;
    d.onmousedown = e => e.preventDefault();
    d.onclick = () => pick(i);
    sdEl.appendChild(d);
  });
}

function pick(i) {
  const f = sres[i]; if(!f) return;
  const [lng,lat] = f.geometry.coordinates;
  ALL.forEach(m => m.setView([lat,lng], 13, {animate:true}));
  center=[lat,lng]; zoom=13;
  siEl.value = bname(f.properties).split(',')[0];
  sdEl.classList.remove('on');
}

async function doSearch(q) {
  if (q.length < 2) { sdEl.classList.remove('on'); return; }
  sdPos();
  sdEl.innerHTML = '<div class="si" style="color:var(--dim);pointer-events:none">Searching…</div>';
  sdEl.classList.add('on');
  try {
    const r = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=7&lang=en`);
    if (!r.ok) throw new Error();
    const d = await r.json();
    renderSD(d.features||[]);
  } catch {
    sdEl.innerHTML = '<div class="si" style="color:var(--red);pointer-events:none">Search error — check connection</div>';
  }
}

siEl.addEventListener('input', () => { clearTimeout(sdt); sdt=setTimeout(()=>doSearch(siEl.value.trim()),300); });
siEl.addEventListener('focus', sdPos);
siEl.addEventListener('keydown', e => {
  const its = sdEl.querySelectorAll('.si');
  if (e.key==='ArrowDown') { e.preventDefault(); hiI=Math.min(hiI+1,its.length-1); its.forEach((x,i)=>x.classList.toggle('hi',i===hiI)); }
  else if (e.key==='ArrowUp') { e.preventDefault(); hiI=Math.max(hiI-1,-1); its.forEach((x,i)=>x.classList.toggle('hi',i===hiI)); }
  else if (e.key==='Enter') { hiI>=0 ? pick(hiI) : doSearch(siEl.value.trim()); }
  else if (e.key==='Escape') sdEl.classList.remove('on');
});
sbEl.onclick = () => doSearch(siEl.value.trim());
document.addEventListener('click', e => {
  if (!e.target.closest('#si')&&!e.target.closest('#sb')&&!e.target.closest('#sd'))
    sdEl.classList.remove('on');
});

// ── Init ─────────────────────────────────────────────────────
window.addEventListener('load', () => {
  setTimeout(() => {
    ALL.forEach(m => { m.invalidateSize(); m.setView(center, zoom); });
    initSwipe();
  }, 300);
});
window.addEventListener('resize', () => ALL.forEach(m => m.invalidateSize()));
</script>
</body>
</html>
